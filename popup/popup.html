<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CookieSpy</title>
  <link rel="stylesheet" href="popup.css" />
</head>
<body>

  <!-- Header -->
  <header>
    <div class="logo">
      <img src="../icons/icon48.png" alt="CookieSpy" width="24" height="24" />
      <span class="logo-text">Cookie<span class="logo-accent">Spy</span></span>
    </div>
    <div id="main-domain" class="domain-badge">—</div>
  </header>

  <!--
    Stat cards double as tabs: clicking one switches the list below to that
    category. role="tab" + tabindex makes them keyboard-focusable; the active
    card is reflected via the .active class and aria-selected for screen
    readers. The default active tab is set in popup.js.
  -->
  <section class="stats" role="tablist" aria-label="Cookie and connection categories">
    <div class="stat-card stat-first" role="tab" tabindex="0" data-view="first" aria-controls="domain-list" aria-selected="false">
      <div class="stat-value" id="count-first">0</div>
      <div class="stat-label">First-Party<br>Cookies</div>
    </div>
    <div class="stat-card stat-third" role="tab" tabindex="0" data-view="third" aria-controls="domain-list" aria-selected="false">
      <div class="stat-value" id="count-third">0</div>
      <div class="stat-label">Third-Party<br>Cookies</div>
    </div>
    <div class="stat-card stat-domains" role="tab" tabindex="0" data-view="domains" aria-controls="domain-list" aria-selected="true">
      <div class="stat-value" id="count-domains">0</div>
      <div class="stat-label">External<br>Connections</div>
    </div>
  </section>

  <!-- List section. Title and hint update based on the active tab. -->
  <section class="domains-section">
    <div class="section-header">
      <span class="section-title" id="section-title">External Domains</span>
      <span class="section-hint" id="section-hint"></span>
    </div>

    <!--
      Populated by popup.js. Initial empty-state is built dynamically per
      active tab so the icon and copy match the category (cookies vs domains).
    -->
    <div id="domain-list" class="domain-list" role="tabpanel"></div>
  </section>

  <!-- Footer -->
  <footer>
    <span class="footer-note">No data stored · Per-tab only</span>
    <a class="footer-link" href="https://cloudsecurity.global" target="_blank">cloudsecurity.global</a>
  </footer>

  <script src="popup.js"></script>
</body>
</html>
